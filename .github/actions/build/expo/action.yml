name: 'Build Expo plugin example app'
description: >
  Expo-specific build of the CTExample app for one phase (pre-sync or post-sync).
  The plugin is a config plugin consumed by CTExample via yalc; this builds the
  plugin, links it into CTExample, runs `expo prebuild`, and COMPILE-ONLY builds
  both platforms (gradlew assembleDebug + xcodebuild build — no emulator/simulator
  boot, to fit the conductor's 90-min timeout). Build failures are captured as
  per-platform outcome outputs (the step itself does not fail) so the caller
  decides whether to abort (pre-sync) or open the PR with a build-failed label
  (post-sync). Unlike the other wrappers there is no per-platform version gating —
  the Expo plugin is one codebase and always builds both platforms.

inputs:
  phase:
    description: 'pre-sync or post-sync (post-sync deletes Podfile.lock before the iOS build).'
    required: true
  wrapper_path:
    description: 'Path under the workspace where the plugin repo is checked out.'
    required: false
    default: 'wrapper'
  node_version:
    description: 'Node.js version for CTExample (Expo ~55 / RN 0.8x needs >= 18).'
    required: false
    default: '20'

outputs:
  android_outcome:
    description: 'success / failure for the Android (gradle) build.'
    value: ${{ steps.android.outputs.outcome }}
  ios_outcome:
    description: 'success / failure for the iOS (xcodebuild) build.'
    value: ${{ steps.ios.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Setup Node ${{ inputs.node_version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Java 17 (for Android build)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Select latest stable Xcode (Expo 55 / RN 0.83 need a recent Xcode/Swift; provided by macos-15)
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: expo-gradle-${{ runner.os }}-${{ hashFiles(format('{0}/CTExample/package.json', inputs.wrapper_path)) }}
        restore-keys: expo-gradle-${{ runner.os }}-

    - name: Cache CocoaPods
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/CocoaPods
          ~/.cocoapods
        key: expo-pods-${{ runner.os }}-${{ hashFiles(format('{0}/CTExample/package.json', inputs.wrapper_path)) }}
        restore-keys: expo-pods-${{ runner.os }}-

    - name: Build plugin + link into CTExample + prebuild (${{ inputs.phase }})
      id: prepare
      working-directory: ${{ inputs.wrapper_path }}
      shell: bash
      run: |
        set +e
        # 1. Build the config plugin (compiled output lands in build/, which yalc publishes).
        npm install --no-audit --no-fund
        npm run build || { echo "::warning::plugin build (npm run build) failed"; echo "prepared=false" >> "$GITHUB_OUTPUT"; exit 0; }
        # 2. Publish to the local yalc store and link it into CTExample.
        npm install -g yalc >/dev/null 2>&1
        yalc publish
        cd CTExample

        # Back up the files we are about to mutate for CI (account values + service
        # stubs) so the final cleanup step can restore them — leaving ONLY the source
        # edits (Claude's) in the working tree for the commit. Captured AFTER Claude's
        # sync in the post-sync phase, so a genuine Claude app.json edit is preserved.
        mkdir -p /tmp/ctexample-backup
        cp app.json /tmp/ctexample-backup/app.json 2>/dev/null || true
        cp assets/google-services.json /tmp/ctexample-backup/google-services.json 2>/dev/null || true
        cp assets/agconnect-services.json /tmp/ctexample-backup/agconnect-services.json 2>/dev/null || true

        yalc add @clevertap/clevertap-expo-plugin
        npm install --no-audit --no-fund

        # 3. The plugin enables FCM + HMS in CTExample's app.json, so prebuild needs
        #    syntactically VALID google-services.json / agconnect-services.json. The
        #    committed copies are empty placeholders, so ALWAYS overwrite with valid
        #    CI stubs. package_name MUST match app.json's android.package
        #    (com.clevertap.expo.demo).
        cat > assets/google-services.json <<'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "stub-project-for-ci",
            "storage_bucket": "stub-project-for-ci.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.clevertap.expo.demo" }
              },
              "oauth_client": [],
              "api_key": [ { "current_key": "STUB_CI_KEY_NOT_FOR_USE" } ],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        # Minimal valid agconnect-services.json so the Huawei agcp gradle plugin
        # (added because enableHmsPush=true) can parse it during the Android build.
        cat > assets/agconnect-services.json <<'EOF'
        {
          "agcgw": {
            "backurl": "https://connect-drcn.hispace.hicloud.com",
            "url": "https://connect-drcn.dbankcloud.cn"
          },
          "client": {
            "cp_id": "0",
            "product_id": "0",
            "client_id": "0",
            "client_secret": "0",
            "project_id": "0",
            "app_id": "0",
            "api_key": "0",
            "package_name": "com.clevertap.expo.demo"
          },
          "configuration_version": "3.0"
        }
        EOF

        # 3b. CTExample's committed app.json uses placeholder CleverTap account values
        #     ("YOUR ACCT ID" etc.) that contain SPACES. The plugin writes them into the
        #     iOS NSE target's Xcode build settings unquoted, producing a project.pbxproj
        #     that pod install cannot parse. Normalize them to valid space-free CI test
        #     values so the realistic (well-formed credentials) path is what we compile.
        python3 - <<'PY'
        import json, pathlib
        p = pathlib.Path("app.json")
        d = json.loads(p.read_text())
        for entry in d.get("expo", {}).get("plugins", []):
            if isinstance(entry, list) and isinstance(entry[0], str) \
               and "clevertap-expo-plugin" in entry[0] and len(entry) > 1 and isinstance(entry[1], dict):
                entry[1]["accountId"] = "TEST-46W-WWR-R85Z"
                entry[1]["accountToken"] = "TEST-200-064"
                entry[1]["accountRegion"] = "eu1"
        p.write_text(json.dumps(d, indent=2))
        print("CI: normalized CleverTap account values in app.json")
        PY

        # 4. Regenerate native projects from app.json + the (possibly edited) plugin.
        #    --no-install: we control npm/pod install ourselves (done above / in the iOS step).
        npx expo prebuild --clean --no-install
        rc=$?
        if [ $rc -eq 0 ]; then echo "prepared=true" >> "$GITHUB_OUTPUT"; else echo "prepared=false" >> "$GITHUB_OUTPUT"; echo "::warning::expo prebuild (${{ inputs.phase }}) failed with $rc"; fi
        exit 0

    - name: Android build (${{ inputs.phase }})
      id: android
      working-directory: ${{ inputs.wrapper_path }}/CTExample
      shell: bash
      run: |
        set +e
        if [ "${{ steps.prepare.outputs.prepared }}" != "true" ]; then
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          echo "::warning::skipping Android build — plugin prepare/prebuild failed"
          exit 0
        fi
        cd android
        ./gradlew :app:assembleDebug --no-daemon
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::Expo Android build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0

    - name: iOS build (${{ inputs.phase }})
      id: ios
      working-directory: ${{ inputs.wrapper_path }}/CTExample
      shell: bash
      run: |
        set +e
        if [ "${{ steps.prepare.outputs.prepared }}" != "true" ]; then
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          echo "::warning::skipping iOS build — plugin prepare/prebuild failed"
          exit 0
        fi
        cd ios
        # Post-sync: Claude may have changed the iOS deployment target / the plugin's
        # Podfile snippets, and the CleverTap-iOS-SDK version floats transitively from
        # clevertap-react-native. Delete the lock so `pod install` re-resolves.
        if [ "${{ inputs.phase }}" = "post-sync" ]; then rm -f Podfile.lock; fi
        pod install --repo-update
        # Compile-only: build for the simulator SDK without code signing; no app boot.
        xcodebuild -workspace CTExample.xcworkspace \
                   -scheme CTExample \
                   -configuration Debug \
                   -sdk iphonesimulator \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   build
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::Expo iOS build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0

    - name: Restore CI-mutated files + remove build artifacts
      # Leaves ONLY source edits in the working tree so the conductor's `git add -A`
      # commits Claude's changes, not build output: restore the CI-stubbed
      # app.json / google-services.json / agconnect-services.json from the backup
      # taken before mutation, and drop the untracked yalc artifacts. Without this
      # the PR is polluted with ~45 .yalc files + CI service stubs + a prebuild-
      # rewritten app.json.
      if: always()
      working-directory: ${{ inputs.wrapper_path }}/CTExample
      shell: bash
      run: |
        [ -f /tmp/ctexample-backup/app.json ] && cp /tmp/ctexample-backup/app.json app.json || true
        [ -f /tmp/ctexample-backup/google-services.json ] && cp /tmp/ctexample-backup/google-services.json assets/google-services.json || true
        [ -f /tmp/ctexample-backup/agconnect-services.json ] && cp /tmp/ctexample-backup/agconnect-services.json assets/agconnect-services.json || true
        rm -rf .yalc yalc.lock 2>/dev/null || true
        echo "Restored CI-mutated CTExample files and removed yalc artifacts."
        exit 0
