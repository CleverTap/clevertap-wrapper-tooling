name: 'Build Flutter example app'
description: >
  Flutter-specific build of the example app for one phase (pre-sync or
  post-sync). Builds Android and/or iOS depending on which versions are set.
  Build failures are captured as per-platform outcome outputs (the step itself
  does not fail) so the caller decides whether to abort (pre-sync) or open the
  PR with a build-failed label (post-sync).
  Unlike React Native, the Flutter example already commits a google-services.json
  and uses use_modular_headers! globally, so no stub/Podfile patch is needed.

inputs:
  phase:
    description: 'pre-sync or post-sync (post-sync deletes Podfile.lock before the iOS build).'
    required: true
  android_version:
    description: 'New Android version (empty skips the Android build).'
    required: false
    default: ''
  ios_version:
    description: 'New iOS version (empty skips the iOS build).'
    required: false
    default: ''
  wrapper_path:
    description: 'Path under the workspace where the wrapper repo is checked out.'
    required: false
    default: 'wrapper'
  flutter_channel:
    description: 'Flutter channel to install.'
    required: false
    default: 'stable'

outputs:
  android_outcome:
    description: 'success / failure / empty(skipped) for the Android build.'
    value: ${{ steps.android.outputs.outcome }}
  ios_outcome:
    description: 'success / failure / empty(skipped) for the iOS build.'
    value: ${{ steps.ios.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Setup Java 17 (for Android build)
      if: inputs.android_version != ''
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: ${{ inputs.flutter_channel }}
        cache: true

    - name: Android build (${{ inputs.phase }})
      id: android
      if: inputs.android_version != ''
      working-directory: ${{ inputs.wrapper_path }}/example
      shell: bash
      run: |
        set +e
        # The example app applies the Google Services plugin (for FCM). Its
        # google-services.json is gitignored, so it's absent on a fresh
        # checkout. For CI we just need a syntactically valid file so the
        # plugin proceeds. The stub package_name MUST match the example's
        # applicationId (com.example.clevertap_plugin_example).
        if [ ! -f android/app/google-services.json ]; then
          cat > android/app/google-services.json <<'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "stub-project-for-ci",
            "storage_bucket": "stub-project-for-ci.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.example.clevertap_plugin_example" }
              },
              "api_key": [ { "current_key": "STUB_CI_KEY_NOT_FOR_USE" } ],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        fi
        flutter pub get
        flutter build apk --debug
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::Flutter Android build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0

    - name: iOS build (${{ inputs.phase }})
      id: ios
      if: inputs.ios_version != ''
      working-directory: ${{ inputs.wrapper_path }}/example
      shell: bash
      run: |
        set +e
        flutter pub get
        # Post-sync: Claude bumped CleverTap-iOS-SDK in the podspec, but
        # ios/Podfile.lock still pins the old version. Delete it so the build's
        # `pod install` re-resolves against the new podspec.
        if [ "${{ inputs.phase }}" = "post-sync" ]; then rm -f ios/Podfile.lock; fi
        flutter build ios --no-codesign --debug
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::Flutter iOS build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0
