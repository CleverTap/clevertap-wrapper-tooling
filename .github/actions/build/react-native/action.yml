name: 'Build React Native example app'
description: >
  React-Native-specific build of the Example app for one phase (pre-sync or
  post-sync). Builds Android and/or iOS depending on which versions are set.
  Build failures are captured as per-platform outcome outputs (the step itself
  does not fail) so the caller decides whether to abort (pre-sync) or open the
  PR with a build-failed label (post-sync).

inputs:
  phase:
    description: 'pre-sync or post-sync (post-sync deletes Podfile.lock before pod install).'
    required: true
  android_version:
    description: 'New Android version (empty skips the Android build).'
    required: false
    default: ''
  ios_version:
    description: 'New iOS version (empty skips the iOS build).'
    required: false
    default: ''
  wrapper_path:
    description: 'Path under the workspace where the wrapper repo is checked out.'
    required: false
    default: 'wrapper'

outputs:
  android_outcome:
    description: 'success / failure / empty(skipped) for the Android build.'
    value: ${{ steps.android.outputs.outcome }}
  ios_outcome:
    description: 'success / failure / empty(skipped) for the iOS build.'
    value: ${{ steps.ios.outputs.outcome }}

runs:
  using: composite
  steps:
    # RN 0.74 gradle plugin works most reliably on Java 17.
    - name: Setup Java 17 (for Android build)
      if: inputs.android_version != ''
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Android build (${{ inputs.phase }})
      id: android
      if: inputs.android_version != ''
      working-directory: ${{ inputs.wrapper_path }}/Example
      shell: bash
      run: |
        set +e
        # The Example app applies the Google Services plugin (for FCM). It needs
        # a google-services.json that's gitignored. For CI we just need a
        # syntactically valid file so the build proceeds. The stub package_name
        # MUST match the Example's applicationId (com.reactnct).
        cat > android/app/google-services.json <<'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "stub-project-for-ci",
            "storage_bucket": "stub-project-for-ci.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.reactnct" }
              },
              "api_key": [ { "current_key": "STUB_CI_KEY_NOT_FOR_USE" } ],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }
          ],
          "configuration_version": "1"
        }
        EOF
        # Use `npm install`, not `npm ci`: the Example lockfile records the
        # wrapper's version (via file:../ dep); `npm ci` refuses if it moved.
        npm install --no-audit --no-fund --legacy-peer-deps
        cd android
        ./gradlew :app:assembleDebug --no-daemon
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::RN Android build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0

    - name: iOS build (${{ inputs.phase }})
      id: ios
      if: inputs.ios_version != ''
      working-directory: ${{ inputs.wrapper_path }}/Example
      shell: bash
      run: |
        set +e
        # The Example Podfile sets :modular_headers on the CleverTap Swift pods,
        # which transitively pull in SDWebImage (Obj-C) — that also needs modular
        # headers when imported from Swift. Inject it per-target (global
        # use_modular_headers! breaks RN's ReactCommon module). The `def ... end`
        # helper block is left alone via state tracking.
        cd ios
        if ! grep -q 'pod "SDWebImage", :modular_headers' Podfile; then
          awk '
            /^def [a-zA-Z_]+/ { in_def = 1 }
            in_def && /^end$/ { in_def = 0; print; next }
            /^target '\''[^'\'']+'\'' do/ { in_target = 1; print; next }
            in_target && /^end$/ {
                print "  pod \"SDWebImage\", :modular_headers => true"
                print
                in_target = 0
                next
            }
            { print }
          ' Podfile > Podfile.patched
          mv Podfile.patched Podfile
        fi
        cd ..
        npm install --no-audit --no-fund --legacy-peer-deps
        cd ios
        # Post-sync: Claude bumped CleverTap-iOS-SDK in the podspec, but
        # Podfile.lock still pins the old version. Delete it to force re-resolve.
        if [ "${{ inputs.phase }}" = "post-sync" ]; then rm -f Podfile.lock; fi
        pod install --repo-update
        xcodebuild -workspace Example.xcworkspace \
                   -scheme Example \
                   -configuration Debug \
                   -sdk iphonesimulator \
                   -derivedDataPath build \
                   CODE_SIGNING_ALLOWED=NO \
                   build
        rc=$?
        if [ $rc -eq 0 ]; then echo "outcome=success" >> "$GITHUB_OUTPUT"; else echo "outcome=failure" >> "$GITHUB_OUTPUT"; echo "::warning::RN iOS build (${{ inputs.phase }}) failed with $rc"; fi
        exit 0
