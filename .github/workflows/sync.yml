name: sync-with-native-release

# Reusable workflow that drives the end-to-end native-release -> wrapper-PR flow.
#
# Called from each wrapper repo's `.github/workflows/native-release-sync.yml`
# via `uses: CleverTap/clevertap-wrapper-tooling/.github/workflows/sync.yml@v1`.
#
# This is a thin CONDUCTOR. The reusable, wrapper-agnostic step groups live in
# composite actions under `.github/actions/`; the wrapper-specific build lives
# in `.github/actions/build/<wrapper>/`. The conductor wires them together and
# owns the outcome-based orchestration (when to open the PR, when to fail).
#
#   setup ............ token, wrapper checkout, branch, Claude CLI      (shared)
#   build/<wrapper> .. example-app build, pre- and post-sync           (per wrapper)
#   claude-sync ...... headless `claude -p` for one platform           (shared)
#   open-pr .......... PR body + labels + gh pr create                 (shared)

on:
  workflow_call:
    inputs:
      wrapper:
        description: 'Wrapper name (react-native, flutter, ...). Selects the build action, prompt, and tool allowlist.'
        required: true
        type: string
      android_module:
        description: 'Android module being bumped (core/pushtemplates/hms). Empty skips Android.'
        required: false
        type: string
        default: ''
      android_version:
        description: 'New Android version (e.g. 8.2.0). Empty skips Android.'
        required: false
        type: string
        default: ''
      ios_module:
        description: 'iOS module being bumped (core/pushtemplates). Empty skips iOS.'
        required: false
        type: string
        default: ''
      ios_version:
        description: 'New iOS version (e.g. 7.7.0). Empty skips iOS.'
        required: false
        type: string
        default: ''
      release_name:
        description: 'Branch suffix; defaults to today YYYY-MM-DD.'
        required: false
        type: string
        default: ''
      base_ref:
        description: 'Wrapper branch to sync from / open the PR against. Default develop; point at a test baseline branch for testing.'
        required: false
        type: string
        default: 'develop'
      model:
        description: 'Claude model to use (e.g. sonnet, opus, haiku).'
        required: false
        type: string
        default: 'sonnet'
      skip_sync:
        description: 'Skip Claude Sync + post-sync builds. Pre-sync builds still run. Debug the build pipeline without Claude cost.'
        required: false
        type: boolean
        default: false
    secrets:
      app_id:
        required: true
      app_private_key:
        required: true
      anthropic_api_key:
        required: true
      slack_webhook_url:
        required: true

jobs:
  sync:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      # Checkout the tooling repo FIRST so its composite actions + scripts are
      # available for every later step (incl. post-failure cost/slack).
      - name: Checkout tooling repo (this repo)
        uses: actions/checkout@v4
        with:
          repository: CleverTap/clevertap-wrapper-tooling
          path: tooling

      # ─── Shared setup (token, wrapper checkout, branch, Claude CLI) ────────
      - name: Setup
        id: setup
        uses: ./tooling/.github/actions/setup
        with:
          android_version: ${{ inputs.android_version }}
          ios_version:     ${{ inputs.ios_version }}
          android_module:  ${{ inputs.android_module }}
          ios_module:      ${{ inputs.ios_module }}
          release_name:    ${{ inputs.release_name }}
          base_ref:        ${{ inputs.base_ref }}
          app_id:          ${{ secrets.app_id }}
          app_private_key: ${{ secrets.app_private_key }}
          wrapper_path:    wrapper

      # ─── Resolve wrapper-specific Claude config (prompt + tool allowlist) ──
      # The allowlist pins python3 to the diff tool (prevents `python3 -c`
      # exfiltration), allows read-only git + inert text utils, and the
      # wrapper's build CLIs. WebFetch/WebSearch are deliberately excluded.
      - name: Resolve Claude config
        id: cc
        shell: bash
        run: |
          DIFF_TOOL="${{ github.workspace }}/tooling/tools/diff_native_api.py"
          # `Skill` lets Claude invoke the repo's .claude/skills (the intended
          # mechanism); without it, skill invocations are DENIED and Claude
          # silently falls back to prompt text (this is why RN skills/Example
          # demos were skipped — caught by the step trace).
          COMMON="Read,Edit,Write,Glob,Grep,Skill,Bash(python3 ${DIFF_TOOL}:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(jq:*),Bash(cat:*),Bash(grep:*),Bash(sed:*),Bash(awk:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(echo:*),Bash(mkdir:*),Bash(find:*),Bash(wc:*)"
          if [ "${{ inputs.wrapper }}" = "flutter" ]; then
            echo "prompt=${{ github.workspace }}/tooling/prompts/sync-orchestrator-flutter.md" >> "$GITHUB_OUTPUT"
            echo "tools=${COMMON},Bash(flutter:*),Bash(dart:*)" >> "$GITHUB_OUTPUT"
          else
            echo "prompt=${{ github.workspace }}/tooling/prompts/sync-orchestrator.md" >> "$GITHUB_OUTPUT"
            echo "tools=${COMMON},Bash(npm:*),Bash(yarn:*),Bash(./gradlew:*),Bash(pod:*),Bash(xcodebuild:*)" >> "$GITHUB_OUTPUT"
          fi

      # ─── PRE-SYNC BUILD GATE ──────────────────────────────────────────────
      # Verifies the build pipeline works on the unchanged checkout BEFORE we
      # spend Claude tokens. Build failures are captured as outputs; the gate
      # step below aborts the run (no Claude cost) if either platform failed.
      - name: Build pre-sync (flutter)
        id: pre_flutter
        if: inputs.wrapper == 'flutter'
        uses: ./tooling/.github/actions/build/flutter
        with:
          phase:           pre-sync
          android_version: ${{ inputs.android_version }}
          ios_version:     ${{ inputs.ios_version }}
          wrapper_path:    wrapper

      - name: Build pre-sync (react-native)
        id: pre_rn
        if: inputs.wrapper == 'react-native'
        uses: ./tooling/.github/actions/build/react-native
        with:
          phase:           pre-sync
          android_version: ${{ inputs.android_version }}
          ios_version:     ${{ inputs.ios_version }}
          wrapper_path:    wrapper

      - name: Pre-sync build gate
        shell: bash
        run: |
          A="${{ steps.pre_flutter.outputs.android_outcome || steps.pre_rn.outputs.android_outcome }}"
          I="${{ steps.pre_flutter.outputs.ios_outcome || steps.pre_rn.outputs.ios_outcome }}"
          echo "pre-sync outcomes: android='$A' ios='$I'"
          if [ "$A" = "failure" ] || [ "$I" = "failure" ]; then
            echo "::error::Pre-sync build failed — aborting before Claude sync (no Claude cost)."
            exit 1
          fi

      # ─── CLAUDE SYNC (skippable via skip_sync) ────────────────────────────
      # Android first, then iOS, sharing the runner filesystem. Each step's
      # outcome bubbles up (composite) so the commit/PR conditions below work.
      - name: Sync Android
        id: sync_android
        if: inputs.android_version != '' && !inputs.skip_sync
        uses: ./tooling/.github/actions/claude-sync
        with:
          platform:          android
          module:            ${{ inputs.android_module }}
          new_version:       ${{ inputs.android_version }}
          # iOS sync runs AFTER Android in this job — tell the prompt so it
          # leaves the iOS bridge to the iOS sync (verify-or-flag otherwise).
          other_platform_syncing: ${{ inputs.ios_version != '' }}
          prompt_path:       ${{ steps.cc.outputs.prompt }}
          allowed_tools:     ${{ steps.cc.outputs.tools }}
          diff_tool_path:    ${{ github.workspace }}/tooling/tools/diff_native_api.py
          release_date:      ${{ steps.setup.outputs.release_date }}
          model:             ${{ inputs.model }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          output_file:       ${{ github.workspace }}/claude-output-android.json
          tooling_root:      ${{ github.workspace }}/tooling
          wrapper_path:      wrapper

      - name: Sync iOS
        id: sync_ios
        if: inputs.ios_version != '' && !inputs.skip_sync
        uses: ./tooling/.github/actions/claude-sync
        with:
          platform:          ios
          module:            ${{ inputs.ios_module }}
          new_version:       ${{ inputs.ios_version }}
          # iOS is the LAST sync in this job — no other platform runs after it.
          other_platform_syncing: 'false'
          prompt_path:       ${{ steps.cc.outputs.prompt }}
          allowed_tools:     ${{ steps.cc.outputs.tools }}
          diff_tool_path:    ${{ github.workspace }}/tooling/tools/diff_native_api.py
          release_date:      ${{ steps.setup.outputs.release_date }}
          model:             ${{ inputs.model }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          output_file:       ${{ github.workspace }}/claude-output-ios.json
          tooling_root:      ${{ github.workspace }}/tooling
          wrapper_path:      wrapper

      # ─── POST-SYNC BUILD VERIFY ───────────────────────────────────────────
      # Re-build on Claude's edits. Implicit success() gating means these are
      # skipped if a Sync step failed. Build failures are captured (not fatal)
      # so the PR still opens with a build-failed label.
      - name: Build post-sync (flutter)
        id: post_flutter
        if: inputs.wrapper == 'flutter' && !inputs.skip_sync
        uses: ./tooling/.github/actions/build/flutter
        with:
          phase:           post-sync
          android_version: ${{ inputs.android_version }}
          ios_version:     ${{ inputs.ios_version }}
          wrapper_path:    wrapper

      - name: Build post-sync (react-native)
        id: post_rn
        if: inputs.wrapper == 'react-native' && !inputs.skip_sync
        uses: ./tooling/.github/actions/build/react-native
        with:
          phase:           post-sync
          android_version: ${{ inputs.android_version }}
          ios_version:     ${{ inputs.ios_version }}
          wrapper_path:    wrapper

      - name: Compute post-sync build outcomes
        id: outcomes
        if: always()
        shell: bash
        run: |
          echo "android=${{ steps.post_flutter.outputs.android_outcome || steps.post_rn.outputs.android_outcome }}" >> "$GITHUB_OUTPUT"
          echo "ios=${{ steps.post_flutter.outputs.ios_outcome || steps.post_rn.outputs.ios_outcome }}" >> "$GITHUB_OUTPUT"

      # ─── Commit, push, open PR ────────────────────────────────────────────
      # Run with !cancelled() so a failing post-sync build does NOT prevent the
      # PR opening (it gets a build-failed label). Skip if Sync itself failed or
      # there were no edits.
      - name: Commit changes
        if: |
          !cancelled()
          && steps.sync_android.outcome != 'failure'
          && steps.sync_ios.outcome != 'failure'
          && (steps.sync_android.outcome == 'success' || steps.sync_ios.outcome == 'success')
        working-directory: wrapper
        shell: bash
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "::warning::No changes to commit. Sync was a no-op."
            echo "no_changes=true" >> "$GITHUB_ENV"
            exit 0
          fi
          git commit -m "$(cat <<EOF
          task: sync wrapper with native release $(date -u +%Y-%m-%d)

          Android: ${{ inputs.android_module }} ${{ inputs.android_version }}
          iOS: ${{ inputs.ios_module }} ${{ inputs.ios_version }}

          Auto-generated by clevertap-wrapper-sync via clevertap-wrapper-tooling.

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"

      - name: Push branch
        if: |
          !cancelled()
          && env.no_changes != 'true'
          && steps.sync_android.outcome != 'failure'
          && steps.sync_ios.outcome != 'failure'
          && (steps.sync_android.outcome == 'success' || steps.sync_ios.outcome == 'success')
        working-directory: wrapper
        run: git push origin "${{ steps.setup.outputs.branch }}"

      - name: Open combined PR
        if: |
          !cancelled()
          && env.no_changes != 'true'
          && steps.sync_android.outcome != 'failure'
          && steps.sync_ios.outcome != 'failure'
          && (steps.sync_android.outcome == 'success' || steps.sync_ios.outcome == 'success')
        uses: ./tooling/.github/actions/open-pr
        with:
          gh_token:              ${{ steps.setup.outputs.token }}
          anthropic_api_key:     ${{ secrets.anthropic_api_key }}
          wrapper:               ${{ inputs.wrapper }}
          android_module:        ${{ inputs.android_module }}
          android_version:       ${{ inputs.android_version }}
          ios_module:            ${{ inputs.ios_module }}
          ios_version:           ${{ inputs.ios_version }}
          release_name:          ${{ steps.setup.outputs.release_name }}
          branch:                ${{ steps.setup.outputs.branch }}
          base_ref:              ${{ inputs.base_ref }}
          android_output:        ${{ github.workspace }}/claude-output-android.json
          ios_output:            ${{ github.workspace }}/claude-output-ios.json
          android_build_outcome: ${{ steps.outcomes.outputs.android }}
          ios_build_outcome:     ${{ steps.outcomes.outputs.ios }}
          model:                 ${{ inputs.model }}
          tooling_root:          ${{ github.workspace }}/tooling
          wrapper_path:          wrapper

      # ─── Cost report ──────────────────────────────────────────────────────
      - name: Compute and report cost
        if: always() && env.no_changes != 'true'
        env:
          ANDROID_OUTPUT: ${{ github.workspace }}/claude-output-android.json
          IOS_OUTPUT:     ${{ github.workspace }}/claude-output-ios.json
          BRANCH:         ${{ steps.setup.outputs.branch }}
          GH_TOKEN:       ${{ steps.setup.outputs.token }}
          REPO:           ${{ github.repository }}
          SOFT_CAP_USD:   '3'
        run: bash ${{ github.workspace }}/tooling/scripts/compute-cost.sh

      # ─── Re-assert job failure on post-sync build failure ─────────────────
      # The PR is already open (with a build-failed label). Failing here makes
      # the run red and triggers the Slack ping, matching the prior behavior.
      - name: Flag post-sync build failure
        if: always() && (steps.outcomes.outputs.android == 'failure' || steps.outcomes.outputs.ios == 'failure')
        shell: bash
        run: |
          echo "::error::Post-sync build failed. PR was opened with a build-failed label; failing the run so maintainers are notified."
          exit 1

      - name: Slack ping on failure
        if: failure() && steps.setup.outcome == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          WRAPPER:           ${{ inputs.wrapper }}
          BRANCH:            ${{ steps.setup.outputs.branch }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash ${{ github.workspace }}/tooling/scripts/slack-notify.sh

      - name: Upload sync outputs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-outputs
          path: |
            claude-output-android.json
            claude-output-ios.json
            claude-stream-android.jsonl
            claude-stream-ios.jsonl
            claude-stderr-android.log
            claude-stderr-ios.log
          if-no-files-found: ignore

      # ─── Post-sync build artifacts (per wrapper) ──────────────────────────
      - name: Upload Android APK (flutter, post-sync)
        if: always() && !inputs.skip_sync && inputs.android_version != '' && inputs.wrapper == 'flutter'
        uses: actions/upload-artifact@v4
        with:
          name: example-android-apk-post-sync
          path: wrapper/example/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: Upload Android APK (react-native, post-sync)
        if: always() && !inputs.skip_sync && inputs.android_version != '' && inputs.wrapper == 'react-native'
        uses: actions/upload-artifact@v4
        with:
          name: example-android-apk-post-sync
          path: wrapper/Example/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload iOS app (flutter, post-sync)
        if: always() && !inputs.skip_sync && inputs.ios_version != '' && inputs.wrapper == 'flutter'
        uses: actions/upload-artifact@v4
        with:
          name: example-ios-app-post-sync
          path: wrapper/example/build/ios/iphoneos/Runner.app
          if-no-files-found: ignore

      - name: Upload iOS app (react-native, post-sync)
        if: always() && !inputs.skip_sync && inputs.ios_version != '' && inputs.wrapper == 'react-native'
        uses: actions/upload-artifact@v4
        with:
          name: example-ios-app-post-sync
          path: wrapper/Example/ios/build/Build/Products/Debug-iphonesimulator/Example.app
          if-no-files-found: ignore
