name: update-ionic-typings

# Reusable workflow that updates the CleverTap typings in the
# awesome-cordova-plugins (a.k.a. ionic-native) package so Ionic/Angular apps
# can call the latest Cordova plugin methods, then opens PR #1 into the typings
# repo. The upstream PR (typings fork -> danielsogl/awesome-cordova-plugins) is
# raised by a human afterwards.
#
# Called from a wrapper repo's dispatch via:
#   uses: CleverTap/clevertap-wrapper-tooling/.github/workflows/update-ionic-typings.yml@v1
#
# Pure JS-API -> typings; no native build, so it runs on ubuntu-latest.

on:
  workflow_call:
    inputs:
      typings_repo:
        description: 'Repo holding the typings to edit / open PR #1 into (e.g. CleverTap/ionic-native or a fork). The App must be installed here.'
        required: true
        type: string
      typings_base:
        description: 'Base branch in the typings repo.'
        required: false
        type: string
        default: 'master'
      cordova_repo:
        description: 'CleverTap Cordova plugin repo (source of www/CleverTap.js + the ionic-native-typings skill).'
        required: true
        type: string
      cordova_ref:
        description: 'Ref in the cordova repo to read the JS API + skill from.'
        required: false
        type: string
        default: 'develop'
      release_name:
        description: 'Branch suffix in the typings repo; defaults to today YYYY-MM-DD.'
        required: false
        type: string
        default: ''
      model:
        description: 'Claude model alias.'
        required: false
        type: string
        default: 'sonnet'
    secrets:
      app_id:
        required: true
      app_private_key:
        required: true
      anthropic_api_key:
        required: true
      slack_webhook_url:
        required: false

jobs:
  update-typings:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tooling repo (this repo)
        uses: actions/checkout@v4
        with:
          repository: CleverTap/clevertap-wrapper-tooling
          path: tooling

      - name: Resolve release name + parse typings repo
        id: vars
        shell: bash
        run: |
          name="${{ inputs.release_name }}"
          [ -z "$name" ] && name=$(date -u +%Y-%m-%d)
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "branch=task/clevertap-typings-${name}" >> "$GITHUB_OUTPUT"
          repo="${{ inputs.typings_repo }}"
          echo "owner=${repo%%/*}" >> "$GITHUB_OUTPUT"
          echo "name_only=${repo##*/}" >> "$GITHUB_OUTPUT"

      # Token scoped to the TYPINGS repo (NOT the calling repo) — this is why the
      # shared `setup` composite can't be reused here. The App must be installed
      # on inputs.typings_repo.
      - name: Mint GitHub App token (scoped to the typings repo)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ steps.vars.outputs.owner }}
          repositories: ${{ steps.vars.outputs.name_only }}

      - name: Checkout typings repo (target to edit)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.typings_repo }}
          ref: ${{ inputs.typings_base }}
          token: ${{ steps.app-token.outputs.token }}
          path: typings
          fetch-depth: 0

      - name: Create typings branch
        working-directory: typings
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin "${{ steps.vars.outputs.branch }}"; then
            echo "::error::Branch ${{ steps.vars.outputs.branch }} already exists in ${{ inputs.typings_repo }}. Pick a different release_name."
            exit 1
          fi
          git checkout -b "${{ steps.vars.outputs.branch }}"
          git config user.email "clevertap-wrapper-sync[bot]@users.noreply.github.com"
          git config user.name  "clevertap-wrapper-sync[bot]"

      - name: Checkout cordova plugin repo (read-only source)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.cordova_repo }}
          ref: ${{ inputs.cordova_ref }}
          path: cordova

      - name: Install Claude Code CLI + envsubst
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code
          if ! command -v envsubst >/dev/null; then sudo apt-get update -y && sudo apt-get install -y gettext-base; fi

      - name: Update typings with Claude
        id: claude
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.anthropic_api_key }}
          TYPINGS_FILE: ${{ github.workspace }}/typings/src/@awesome-cordova-plugins/plugins/clevertap/index.ts
          CORDOVA_JS: ${{ github.workspace }}/cordova/www/CleverTap.js
          SKILL_PATH: ${{ github.workspace }}/cordova/.claude/skills/ionic-native-typings/SKILL.md
          CORDOVA_REF: ${{ inputs.cordova_ref }}
        run: |
          OUT="${{ github.workspace }}/typings-output.json"
          STREAM="${{ github.workspace }}/typings-stream.jsonl"
          STDERR="${{ github.workspace }}/typings-stderr.log"
          prompt="$(envsubst < "${{ github.workspace }}/tooling/prompts/update-ionic-typings.md")"
          echo "Prompt length: ${#prompt} chars"
          # Read/Edit/Grep/Glob operate on the absolute paths above (Bash is denied
          # outside cwd, but the file TOOLS are not). Allow read-only git for self-check.
          set +e
          claude -p "$prompt" \
                 --model "${{ inputs.model }}" \
                 --allowed-tools "Read,Edit,Write,Glob,Grep,Bash(git status:*),Bash(git diff:*)" \
                 --output-format stream-json --verbose \
                 > "$STREAM" 2> "$STDERR"
          rc=$?
          set -e
          jq -c 'select(.type=="result")' "$STREAM" 2>/dev/null | tail -1 > "$OUT" || true
          if [ $rc -ne 0 ]; then
            echo "::error::claude exited with $rc"
            echo "::group::stderr"; cat "$STDERR" || true; echo "::endgroup::"
            echo "::group::stream (last 50 events)"; tail -50 "$STREAM" || true; echo "::endgroup::"
            exit $rc
          fi
          echo "::group::Claude step trace"
          python3 "${{ github.workspace }}/tooling/scripts/trace-claude-actions.py" "$STREAM" || true
          echo "::endgroup::"

      - name: Commit + push typings branch
        id: commit
        working-directory: typings
        shell: bash
        run: |
          git add "src/@awesome-cordova-plugins/plugins/clevertap/index.ts"
          if git diff --cached --quiet; then
            echo "::warning::No typings changes — nothing missing to add."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat(clevertap): support clevertap-cordova ${{ inputs.cordova_ref }}

          Adds the latest CleverTap Cordova plugin methods to the awesome-cordova-plugins typings.
          Auto-generated by clevertap-wrapper-sync via clevertap-wrapper-tooling.

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "${{ steps.vars.outputs.branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR #1 into the typings repo
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN:     ${{ steps.app-token.outputs.token }}
          CORDOVA_REPO: ${{ inputs.cordova_repo }}
          CORDOVA_REF:  ${{ inputs.cordova_ref }}
          TYPINGS_REPO: ${{ inputs.typings_repo }}
          BRANCH:       ${{ steps.vars.outputs.branch }}
        shell: bash
        run: |
          # Render the body from the structured summary inside the Claude result
          # envelope (tolerant of a ```json fence / prose) + the envelope's
          # authoritative cost/model/token fields.
          python3 "${{ github.workspace }}/tooling/scripts/render-typings-pr-body.py" \
            "${{ github.workspace }}/typings-output.json" > pr-body.md
          gh pr create \
            --repo "${{ inputs.typings_repo }}" \
            --base "${{ inputs.typings_base }}" \
            --head "${{ steps.vars.outputs.branch }}" \
            --title "feat(clevertap): support clevertap-cordova ${{ inputs.cordova_ref }}" \
            --body-file pr-body.md

      # Reads the envelope's authoritative total_cost_usd + token usage and posts
      # an informational PR comment on the typings PR if over the soft cap.
      - name: Compute and report cost
        if: always() && steps.commit.outputs.changed == 'true'
        env:
          ANDROID_OUTPUT: ${{ github.workspace }}/typings-output.json
          IOS_OUTPUT:     ''
          BRANCH:         ${{ steps.vars.outputs.branch }}
          REPO:           ${{ inputs.typings_repo }}
          GH_TOKEN:       ${{ steps.app-token.outputs.token }}
          SOFT_CAP_USD:   '3'
        run: bash ${{ github.workspace }}/tooling/scripts/compute-cost.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ionic-typings-output
          path: |
            typings-output.json
            typings-stream.jsonl
            typings-stderr.log
          if-no-files-found: ignore

      - name: Slack ping on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          WRAPPER: ionic-typings
          BRANCH: ${{ steps.vars.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash ${{ github.workspace }}/tooling/scripts/slack-notify.sh
